<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vòng Quay 12A1</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; font-family: sans-serif; }
        
        /* Vòng quay thiết kế sang trọng */
        .wheel { 
            width: 300px; height: 300px; border-radius: 50%; 
            border: 8px solid #333; position: relative; 
            background: conic-gradient(#3b82f6 0deg 72deg, #60a5fa 72deg 144deg, #93c5fd 144deg 216deg, #bfdbfe 216deg 288deg, #dbeafe 288deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1);
        }
        
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #dc2626; margin-bottom: 10px; }

        button { 
            margin-top: 30px; padding: 15px 50px; font-size: 20px; font-weight: bold;
            background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div class="pointer"></div>
    <div id="wheel" class="wheel"></div>
    <button id="btn" onclick="quay()">QUAY NGAY</button>

    <script>
        function quay() {
            const btn = document.getElementById('btn');
            const wheel = document.getElementById('wheel');
            btn.disabled = true;
            
            const deg = Math.floor(Math.random() * 360) + 1440;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const scores = [1200, 1050, 1000, 900, 800];
                const finalDeg = deg % 360;
                const index = Math.floor(finalDeg / 72);
                
                alert("Chúc mừng!!! Bạn sẽ đạt: " + scores[index] + " điểm VACT!\n\nLời dặn: Hãy luôn bình tĩnh và tô phiếu thật cẩn thận bạn nhé!");
                
                btn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>

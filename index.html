<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12A1 CHINH PHỤC VACT</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #8B0000; font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        h1 { color: #FFD700; font-family: 'Montserrat', sans-serif; font-size: 65px; text-transform: uppercase; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); animation: pulse 1.5s infinite; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .wheel-container { position: relative; transition: 0.5s; }
        .wheel { width: 400px; height: 400px; border-radius: 50%; border: 15px solid #FFD700; position: relative; transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99); box-shadow: 0 0 60px rgba(0,0,0,0.5); background: conic-gradient(#d32f2f 0deg 72deg, #f57c00 72deg 144deg, #fbc02d 144deg 216deg, #388e3c 216deg 288deg, #1976d2 288deg 360deg); }
        .wheel::before, .wheel::after, .line3, .line4 { content: ""; position: absolute; top: 0; left: 50%; width: 6px; height: 50%; transform-origin: bottom; background: white; z-index: 1; }
        .wheel::before { transform: rotate(72deg); }
        .wheel::after { transform: rotate(144deg); }
        .line3 { transform: rotate(216deg); }
        .line4 { transform: rotate(288deg); }
        
        .pointer { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid #FFD700; z-index: 10; }

        button { margin-top: 60px; padding: 25px 80px; font-size: 28px; font-weight: 900; font-family: 'Montserrat'; background: #FFD700; color: #8B0000; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
        
        /* Popup Neon */
        #resultPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(255, 255, 255, 0.98); padding: 50px; border-radius: 40px; text-align: center; width: 450px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.6), 0 20px 50px rgba(0,0,0,0.5); z-index: 100; border: 4px solid #FFD700; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .show-popup { display: block !important; transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>

    <h1>12A1 CHINH PHỤC VACT</h1>
    <div class="wheel-container" id="container">
        <div class="pointer"></div>
        <div id="wheel" class="wheel">
            <div class="line3"></div>
            <div class="line4"></div>
        </div>
    </div>
    <button id="spinBtn" onclick="quay()">QUAY NGAY</button>

    <div id="resultPopup">
        <h2 id="rScore" style="color:#d32f2f; font-size: 55px; margin:0; font-family: 'Montserrat'; text-shadow: 2px 2px 5px rgba(0,0,0,0.2);"></h2>
        <p id="rWish" style="font-weight:900; font-size: 1.6em; margin: 20px 0; color: #333; line-height: 1.4;"></p>
        <p id="rAdvice" style="color:#555; font-style:italic; font-size: 1.2em; border-top: 2px dashed #ddd; padding-top: 15px;"></p>
        <button style="padding: 15px 40px; font-size: 20px; background:#8B0000; color:white; margin-top: 20px;" onclick="dongPopup()">Đóng</button>
    </div>

    <audio id="spinAudio" src="https://actions.google.com/sounds/v1/musical/happy_celebration.ogg"></audio>

    <script>
        const scores = ["800+", "900+", "1000+", "1050+", "1200"];
        const wishes = [
            "Chúc mừng bạn! Kết quả xứng đáng với nỗ lực của bạn.",
            "Đỉnh quá! Bạn thực sự là chiến binh 12A1.",
            "Tuyệt vời! Phong độ này sẽ giúp bạn tỏa sáng.",
            "Wow! Vận may đang gọi tên bạn.",
            "Kết quả này khẳng định bản lĩnh của bạn!"
        ];
        const advices = [
            "Tô phiếu cẩn thận, nhớ kiểm tra mã đề hai lần nhé.",
            "Bình tĩnh đọc kỹ đề, vội vàng là kẻ thù của điểm số.",
            "Phân bổ thời gian hợp lý, giữ cái đầu lạnh bạn nhé.",
            "Sự chỉn chu trong chi tiết nhỏ tạo nên khác biệt lớn.",
            "Giữ nhịp thở đều, tâm trí tĩnh lặng để làm bài tốt nhất."
        ];

        function quay() {
            const btn = document.getElementById('spinBtn');
            const wheel = document.getElementById('wheel');
            const audio = document.getElementById('spinAudio');
            
            btn.disabled = true;
            audio.play();
            
            const deg = Math.floor(Math.random() * 3600) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const idx = Math.floor((deg % 360) / 72);
                document.getElementById('rScore').innerText = scores[idx] + " Điểm";
                document.getElementById('rWish').innerText = wishes[Math.floor(Math.random() * wishes.length)];
                document.getElementById('rAdvice').innerText = "💡 " + advices[Math.floor(Math.random() * advices.length)];
                
                const popup = document.getElementById('resultPopup');
                popup.classList.add('show-popup');
            }, 5100);
        }

        function dongPopup() {
            const popup = document.getElementById('resultPopup');
            popup.classList.remove('show-popup');
            setTimeout(() => { popup.style.display = 'none'; }, 400);
            document.getElementById('spinBtn').disabled = false;
        }
    </script>
</body>
</html>

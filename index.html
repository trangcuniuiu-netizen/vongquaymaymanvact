<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>12A1 CHINH PHỤC VACT</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background: #8B0000; font-family: 'Roboto', sans-serif; 
        }
        h1 { color: #FFD700; font-family: 'Montserrat', sans-serif; font-size: 45px; text-transform: uppercase; margin-bottom: 30px; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); text-align: center;}

        .wheel-container { position: relative; }
        .wheel { 
            width: 350px; height: 350px; border-radius: 50%; border: 15px solid #FFD700;
            position: relative; transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
            background: conic-gradient(
                #d32f2f 0deg 72deg, #f57c00 72deg 144deg, #fbc02d 144deg 216deg, 
                #388e3c 216deg 288deg, #1976d2 288deg 360deg
            );
        }
        
        /* Tạo các đường kẻ phân chia */
        .wheel::before { content: ""; position: absolute; top: 0; left: 50%; width: 4px; height: 50%; transform-origin: bottom; background: white; transform: rotate(72deg); z-index: 1; }
        .wheel::after { content: ""; position: absolute; top: 0; left: 50%; width: 4px; height: 50%; transform-origin: bottom; background: white; transform: rotate(144deg); z-index: 1; }
        .line3 { position: absolute; top: 0; left: 50%; width: 4px; height: 50%; transform-origin: bottom; background: white; transform: rotate(216deg); z-index: 1; }
        .line4 { position: absolute; top: 0; left: 50%; width: 4px; height: 50%; transform-origin: bottom; background: white; transform: rotate(288deg); z-index: 1; }
        
        .pointer { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #FFD700; z-index: 10; }

        button { margin-top: 50px; padding: 20px 60px; font-size: 22px; font-weight: bold; font-family: 'Montserrat'; background: #FFD700; color: #8B0000; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
        
        #resultPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 40px; border-radius: 25px; text-align: center; width: 300px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 20; }
    </style>
</head>
<body>

    <h1>12A1 CHINH PHỤC VACT</h1>
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel" class="wheel">
            <div class="line3"></div>
            <div class="line4"></div>
        </div>
    </div>
    <button id="spinBtn" onclick="quay()">QUAY NGAY</button>

    <div id="resultPopup">
        <h2 id="rScore" style="color:#d32f2f; font-size: 30px;"></h2>
        <p id="rWish" style="font-weight:bold;"></p>
        <p id="rAdvice" style="color:#666; font-style:italic;"></p>
        <button onclick="document.getElementById('resultPopup').style.display='none'; document.getElementById('spinBtn').disabled=false;">Đóng</button>
    </div>

    <script>
        const scores = ["800+", "900+", "1000+", "1050+", "1200+"];
        const wishes = ["Đỉnh cao 12A1!", "Vận may đang gọi!", "Quá xuất sắc!", "Bản lĩnh đấy!", "Đẳng cấp quá!"];
        const advices = ["Tô phiếu thật cẩn thận nhé!", "Giữ bình tĩnh, đọc kỹ đề!", "Phân bổ thời gian hợp lý!", "Chỉn chu là chìa khóa!", "Tĩnh tâm làm bài nhé!"];

        function quay() {
            const btn = document.getElementById('spinBtn');
            const wheel = document.getElementById('wheel');
            btn.disabled = true;
            const deg = Math.floor(Math.random() * 3600) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const idx = Math.floor((deg % 360) / 72);
                document.getElementById('rScore').innerText = scores[idx] + " Điểm";
                document.getElementById('rWish').innerText = wishes[Math.floor(Math.random() * wishes.length)];
                document.getElementById('rAdvice').innerText = advices[Math.floor(Math.random() * advices.length)];
                document.getElementById('resultPopup').style.display = 'block';
            }, 5100);
        }
    </script>
</body>
</html>

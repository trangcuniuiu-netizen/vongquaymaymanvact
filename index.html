<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn 12A1</title>
    <!-- Thư viện Pháo hoa & Popup -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #2563eb; --accent: #3b82f6; --bg: #f0f7ff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle, #ffffff, #e0e7ff); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        h1 { color: var(--primary); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        
        .wheel-container { position: relative; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
        
        #wheel { 
            width: 350px; height: 350px; border-radius: 50%; 
            border: 12px solid #ffffff; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1), 0 0 20px rgba(37, 99, 235, 0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
            background: conic-gradient(#3b82f6 0deg 72deg, #60a5fa 72deg 144deg, #93c5fd 144deg 216deg, #bfdbfe 216deg 288deg, #dbeafe 288deg 360deg); 
        }
        
        .pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ef4444; z-index: 10; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        
        button { 
            margin-top: 50px; padding: 18px 60px; font-size: 22px; cursor: pointer; 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            color: white; border: none; border-radius: 50px; font-weight: bold; 
            transition: 0.3s; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: scale(1.08); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.6); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Vòng Quay May Mắn 12A1</h1>
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>
    <button id="spinBtn" onclick="spin()">QUAY NGAY!</button>

    <script>
        const scores = [1200, 1050+, 1000+, 900+, 800+];
        const wishes = [
            "Chúc mừng bạn! Kết quả này hoàn toàn xứng đáng với sự nỗ lực của bạn.",
            "Đỉnh quá! Bạn đã chứng minh được bản lĩnh của một chiến binh 12A1 thực thụ.",
            "Quá tuyệt vời! Nhìn cách bạn làm bài là thấy ngay phong độ đỉnh cao rồi.",
            "Thật ấn tượng! Vận may này là phần thưởng cho thái độ học tập nghiêm túc của bạn."
        ];
        const advices = [
            "Tô phiếu cẩn thận, nhớ kiểm tra mã đề hai lần nhé. Đừng để mất điểm oan!",
            "Bình tĩnh đọc kỹ từng chữ trong đề, sự vội vàng là kẻ thù lớn nhất.",
            "Phân bổ thời gian hợp lý, câu nào bí quá hãy bỏ qua, giữ cái đầu lạnh nhé!",
            "Tô kín ô, nét đậm rõ ràng. Sự chỉn chu trong chi tiết nhỏ sẽ tạo nên thành công lớn.",
            "Giữ nhịp thở đều, thả lỏng vai. Khi tâm trí tĩnh lặng, bạn sẽ làm bài hiệu quả nhất."
        ];

        function spin() {
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spinBtn');
            
            btn.disabled = true;
            const randomRotation = Math.floor(Math.random() * 360) + 2000;
            wheel.style.transform = `rotate(${randomRotation}deg)`;

            setTimeout(() => {
                const index = Math.floor((randomRotation % 360) / 72);
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                
                Swal.fire({
                    title: 'Chúc mừng bạn!',
                    html: `<div style="font-size: 32px; color: #2563eb; font-weight: 800; margin: 10px 0;">${scores[index]} VACT</div>
                           <p style="font-size: 18px; font-weight: 500;">${wishes[Math.floor(Math.random() * wishes.length)]}</p>
                           <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
                           <p style="font-size: 16px; font-style: italic; color: #475569;">💡 ${advices[Math.floor(Math.random() * advices.length)]}</p>`,
                    icon: 'success',
                    confirmButtonText: 'Đã rõ, mình sẽ làm tốt!',
                    confirmButtonColor: '#2563eb'
                }).then(() => {
                    btn.disabled = false;
                });
            }, 4000);
        }
    </script>
</body>
</html>
